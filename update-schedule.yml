name: Update FIFA Schedule

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch FIFA schedule
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 fetch_schedule.py

      - name: Commit updated schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --cached --quiet && echo "No changes." || (git commit -m "chore: update FIFA schedule $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
